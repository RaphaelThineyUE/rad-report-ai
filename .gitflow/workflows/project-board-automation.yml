# .github/workflows/project-board-automation.yml
#
# Automatically moves issues and PRs between Project Board columns
# based on labels, open/close events, and PR review state.
#
# Columns: Backlog → In Progress → Review → Done
#
# Label triggers:
#   in-progress / wip                           → In Progress
#   needs-review / in-review / ready-for-review → Review
#   done / completed                            → Done
#   P0-Production / P1-Stability / P2-Enhancement → Backlog

name: 🗂️ Project Board Automation

on:
  issues:
    types: [opened, reopened, labeled, closed]
  pull_request:
    types: [opened, reopened, labeled, closed, review_requested, ready_for_review]

env:
  GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
  PROJECT_OWNER: RaphaelThineyUE
  PROJECT_NUMBER: 6

jobs:
  sync-to-board:
    name: Sync to Project Board
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    steps:
      # ── Step 1: Resolve project IDs dynamically via GraphQL ──────────────
      - name: 🔍 Fetch project field & option IDs
        id: project
        run: |
          RAW=$(gh api graphql -f query='
            query($owner: String!, $num: Int!) {
              user(login: $owner) {
                projectV2(number: $num) {
                  id
                  fields(first: 30) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options { id name }
                      }
                    }
                  }
                }
              }
            }' \
            -f owner="${PROJECT_OWNER}" \
            -F num="${PROJECT_NUMBER}")

          PROJECT_ID=$(echo "$RAW"    | jq -r '.data.user.projectV2.id')
          FIELD_ID=$(echo "$RAW"      | jq -r '.data.user.projectV2.fields.nodes[]
                                                | select(.name=="Status") | .id')
          OPT_BACKLOG=$(echo "$RAW"   | jq -r '.data.user.projectV2.fields.nodes[]
                                                | select(.name=="Status")
                                                | .options[] | select(.name=="Backlog") | .id')
          OPT_INPROG=$(echo "$RAW"    | jq -r '.data.user.projectV2.fields.nodes[]
                                                | select(.name=="Status")
                                                | .options[] | select(.name=="In Progress") | .id')
          OPT_REVIEW=$(echo "$RAW"    | jq -r '.data.user.projectV2.fields.nodes[]
                                                | select(.name=="Status")
                                                | .options[] | select(.name=="Review") | .id')
          OPT_DONE=$(echo "$RAW"      | jq -r '.data.user.projectV2.fields.nodes[]
                                                | select(.name=="Status")
                                                | .options[] | select(.name=="Done") | .id')

          echo "project_id=$PROJECT_ID"   >> "$GITHUB_OUTPUT"
          echo "field_id=$FIELD_ID"       >> "$GITHUB_OUTPUT"
          echo "opt_backlog=$OPT_BACKLOG" >> "$GITHUB_OUTPUT"
          echo "opt_inprog=$OPT_INPROG"  >> "$GITHUB_OUTPUT"
          echo "opt_review=$OPT_REVIEW"  >> "$GITHUB_OUTPUT"
          echo "opt_done=$OPT_DONE"      >> "$GITHUB_OUTPUT"

      # ── Step 2: Decide which column to move to ───────────────────────────
      - name: 🧭 Determine target column
        id: target
        run: |
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"
          LABEL="${{ github.event.label.name }}"
          MERGED="${{ github.event.pull_request.merged }}"

          OPTION_ID=""

          case "$ACTION" in
            opened|reopened)
              OPTION_ID="${{ steps.project.outputs.opt_backlog }}"
              ;;

            closed)
              if [[ "$EVENT" == "pull_request" && "$MERGED" != "true" ]]; then
                echo "PR closed without merge — skipping"
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              OPTION_ID="${{ steps.project.outputs.opt_done }}"
              ;;

            labeled)
              case "$LABEL" in
                "in-progress"|"wip"|"in progress")
                  OPTION_ID="${{ steps.project.outputs.opt_inprog }}" ;;
                "needs-review"|"in-review"|"ready-for-review"|"review")
                  OPTION_ID="${{ steps.project.outputs.opt_review }}" ;;
                "done"|"completed")
                  OPTION_ID="${{ steps.project.outputs.opt_done }}" ;;
                "P0-Production"|"P1-Stability"|"P2-Enhancement"|"backlog"|"todo")
                  OPTION_ID="${{ steps.project.outputs.opt_backlog }}" ;;
                *)
                  echo "Label '$LABEL' has no column mapping — skipping"
                  echo "skip=true" >> "$GITHUB_OUTPUT"
                  exit 0
                  ;;
              esac
              ;;

            review_requested|ready_for_review)
              OPTION_ID="${{ steps.project.outputs.opt_review }}"
              ;;

            *)
              echo "No mapping for event=$EVENT action=$ACTION — skipping"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          echo "option_id=$OPTION_ID" >> "$GITHUB_OUTPUT"
          echo "skip=false"           >> "$GITHUB_OUTPUT"

      # ── Step 3: Ensure item is on the board & get its item ID ────────────
      - name: 📌 Add to project (if missing) & get item ID
        if: steps.target.outputs.skip != 'true'
        id: item
        run: |
          if [[ "${{ github.event_name }}" == "issues" ]]; then
            NODE_ID="${{ github.event.issue.node_id }}"
          else
            NODE_ID="${{ github.event.pull_request.node_id }}"
          fi

          PROJECT_ID="${{ steps.project.outputs.project_id }}"

          ITEM_ID=$(gh api graphql -f query='
            query($proj: ID!) {
              node(id: $proj) {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      id
                      content {
                        ... on Issue       { id }
                        ... on PullRequest { id }
                      }
                    }
                  }
                }
              }
            }' \
            -f proj="$PROJECT_ID" \
            | jq -r --arg nid "$NODE_ID" \
              '.data.node.items.nodes[] | select(.content.id == $nid) | .id' \
            | head -1)

          if [[ -z "$ITEM_ID" ]]; then
            ITEM_ID=$(gh api graphql -f query='
              mutation($proj: ID!, $cnt: ID!) {
                addProjectV2ItemById(input: { projectId: $proj, contentId: $cnt }) {
                  item { id }
                }
              }' \
              -f proj="$PROJECT_ID" \
              -f cnt="$NODE_ID" \
              | jq -r '.data.addProjectV2ItemById.item.id')
            echo "Added to project — item ID: $ITEM_ID"
          fi

          echo "item_id=$ITEM_ID" >> "$GITHUB_OUTPUT"

      # ── Step 4: Update the Status field ──────────────────────────────────
      - name: 🚀 Move to target column
        if: steps.target.outputs.skip != 'true'
        run: |
          gh api graphql -f query='
            mutation($proj: ID!, $item: ID!, $field: ID!, $opt: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $proj
                itemId:    $item
                fieldId:   $field
                value:     { singleSelectOptionId: $opt }
              }) {
                projectV2Item { id }
              }
            }' \
            -f proj="${{ steps.project.outputs.project_id }}" \
            -f item="${{ steps.item.outputs.item_id }}"       \
            -f field="${{ steps.project.outputs.field_id }}"  \
            -f opt="${{ steps.target.outputs.option_id }}"

          echo "✅ Board column updated"
