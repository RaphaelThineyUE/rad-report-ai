<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Rose/Ribbon logo -->
  <g>
    <!-- Outer petals -->
    <ellipse cx="24" cy="12" rx="6" ry="8" fill="#e8a7c6" opacity="0.8"/>
    <ellipse cx="36" cy="18" rx="6" ry="8" fill="#e8a7c6" opacity="0.8" transform="rotate(60 36 18)"/>
    <ellipse cx="36" cy="30" rx="6" ry="8" fill="#e8a7c6" opacity="0.8" transform="rotate(120 36 30)"/>
    <ellipse cx="24" cy="36" rx="6" ry="8" fill="#e8a7c6" opacity="0.8"/>
    <ellipse cx="12" cy="30" rx="6" ry="8" fill="#e8a7c6" opacity="0.8" transform="rotate(240 12 30)"/>
    <ellipse cx="12" cy="18" rx="6" ry="8" fill="#e8a7c6" opacity="0.8" transform="rotate(300 12 18)"/>

    <!-- Inner petals -->
    <ellipse cx="24" cy="14" rx="4" ry="6" fill="#d97ab8"/>
    <ellipse cx="32" cy="20" rx="4" ry="6" fill="#d97ab8" transform="rotate(60 32 20)"/>
    <ellipse cx="32" cy="28" rx="4" ry="6" fill="#d97ab8" transform="rotate(120 32 28)"/>
    <ellipse cx="24" cy="34" rx="4" ry="6" fill="#d97ab8"/>
    <ellipse cx="16" cy="28" rx="4" ry="6" fill="#d97ab8" transform="rotate(240 16 28)"/>
    <ellipse cx="16" cy="20" rx="4" ry="6" fill="#d97ab8" transform="rotate(300 16 20)"/>

    <!-- Center -->
    <circle cx="24" cy="24" r="5" fill="#c24a9f"/>
    <circle cx="24" cy="24" r="3" fill="#a01a7d"/>
  </g>
</svg>